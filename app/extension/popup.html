<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONBEAT</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

<div class="container">

    <div class="hero">
        <h1>ONBEAT</h1>
        <p class="subtitle">Music that moves with you.</p>
    </div>

    <label>Workout</label>

    <select id="workout">
        <option>HIIT</option>
        <option>Running</option>
        <option>Strength</option>
        <option>Cycling</option>
        <option>Walking</option>
        <option>Yoga</option>
    </select>

    <div class="bpm-card">
        <span>Recommended Tempo</span>
        <h2 id="bpm">170 BPM</h2>
    </div>

    <button id="spotify">
        Connect Spotify
    </button>

    <button id="generate">
        Generate Playlist
    </button>

</div>

<script type="module" src="popup.js"></script>

</body>
</html>
